<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3분 건강습관 코칭 유형 검사</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 640px;
  margin: 0 auto;
  background: #fff;
  border-radius: 20px;
  padding: 32px 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
h1 {
  font-size: 1.5rem;
  color: #2d3748;
  text-align: center;
  margin-bottom: 8px;
}
.description {
  font-size: 0.9rem;
  color: #718096;
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.6;
}
.question-card {
  background: #f7fafc;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.question-card.answered { border-color: #667eea; }
.question-number {
  font-size: 0.75rem;
  color: #667eea;
  font-weight: 700;
  margin-bottom: 6px;
}
.question-text {
  font-size: 1rem;
  color: #2d3748;
  font-weight: 600;
  margin-bottom: 14px;
}
.option-label {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 8px;
  background: #fff;
  border: 1.5px solid #e2e8f0;
  transition: all 0.2s;
}
.option-label:hover { border-color: #667eea; background: #f0f0ff; }
.option-label.selected { border-color: #667eea; background: #eef2ff; }
.option-label input { margin-top: 3px; accent-color: #667eea; }
.option-text { font-size: 0.9rem; color: #4a5568; line-height: 1.5; }
.option-badge {
  font-size: 0.75rem;
  font-weight: 700;
  color: #667eea;
  background: #eef2ff;
  border-radius: 4px;
  padding: 2px 6px;
  flex-shrink: 0;
}
.submit-btn {
  display: block;
  width: 100%;
  padding: 16px;
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 24px;
  transition: transform 0.15s, opacity 0.15s;
}
.submit-btn:hover { transform: translateY(-2px); opacity: 0.95; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.progress-bar {
  width: 100%;
  height: 6px;
  background: #e2e8f0;
  border-radius: 3px;
  margin-bottom: 24px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 3px;
  transition: width 0.3s;
}
.result-section { text-align: center; }
.result-type {
  font-size: 2.2rem;
  font-weight: 800;
  color: #667eea;
  margin-bottom: 4px;
}
.result-nickname {
  font-size: 1.2rem;
  color: #4a5568;
  margin-bottom: 24px;
}
.dimension-scores {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.dimension-card {
  background: #f7fafc;
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.dimension-label {
  font-size: 0.8rem;
  color: #718096;
  margin-bottom: 4px;
}
.dimension-value {
  font-size: 1.1rem;
  font-weight: 700;
  color: #2d3748;
}
.dimension-preference {
  font-size: 0.75rem;
  color: #667eea;
  margin-top: 2px;
}
.coaching-section {
  background: #f0f0ff;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 20px;
  text-align: left;
}
.coaching-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: #667eea;
  margin-bottom: 10px;
}
.coaching-item {
  font-size: 0.9rem;
  color: #4a5568;
  margin-bottom: 6px;
  padding-left: 12px;
  position: relative;
}
.coaching-item::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: #667eea;
}
.coach-style {
  background: linear-gradient(135deg, #667eea22, #764ba222);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 24px;
  font-size: 0.95rem;
  color: #2d3748;
  line-height: 1.6;
}
.warning-msg {
  color: #e53e3e;
  font-size: 0.85rem;
  text-align: center;
  margin-top: 8px;
  display: none;
}
@media (max-width: 480px) {
  body { padding: 12px; }
  .container { padding: 24px 16px; border-radius: 16px; }
  h1 { font-size: 1.3rem; }
  .dimension-scores { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// ============================================================
// Google Sheets 연동 설정
// Apps Script 배포 후 아래 URL을 교체하세요
// ============================================================
const GOOGLE_SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

const surveyData = {
  "title": "3분 건강습관 코칭 유형 검사",
  "description": "평소 자신의 모습과 더 가까운 답을 선택해 주세요. 바람직해 보이는 답보다 실제 행동에 가까운 답을 선택하는 것이 좋습니다.",
  "questions": [
    {"id":1,"text":"건강한 습관을 새로 시작할 때 나는","dimension":"EI","options":[{"label":"A","text":"다른 사람에게 알리거나 함께 시작하면 의욕이 생긴다.","value":"E"},{"label":"B","text":"혼자 조용히 계획해야 마음이 편하다.","value":"I"}]},
    {"id":2,"text":"건강관리 조언을 받을 때 나는","dimension":"SN","options":[{"label":"A","text":"오늘 무엇을 해야 하는지 구체적으로 알고 싶다.","value":"S"},{"label":"B","text":"이 행동이 장기적으로 어떤 변화를 만드는지 알고 싶다.","value":"N"}]},
    {"id":3,"text":"계획을 지키지 못했을 때 AI 코치가","dimension":"TF","options":[{"label":"A","text":"원인을 객관적으로 분석해 주는 것이 도움이 된다.","value":"T"},{"label":"B","text":"먼저 힘들었던 상황을 이해해 주는 것이 도움이 된다.","value":"F"}]},
    {"id":4,"text":"일주일 건강 계획은","dimension":"JP","options":[{"label":"A","text":"요일과 시간을 미리 정해 두는 것이 편하다.","value":"J"},{"label":"B","text":"그날의 상황에 맞게 선택할 수 있어야 편하다.","value":"P"}]},
    {"id":5,"text":"계획을 지키기 어려운 날에는","dimension":"EI","options":[{"label":"A","text":"누군가에게 상황을 이야기하면 다시 시작하기 쉽다.","value":"E"},{"label":"B","text":"혼자 원인을 정리해야 다시 시작하기 쉽다.","value":"I"}]},
    {"id":6,"text":"피드백을 받을 때 나는","dimension":"TF","options":[{"label":"A","text":"개선할 점을 분명하게 말해 주는 것이 좋다.","value":"T"},{"label":"B","text":"잘한 점을 인정한 뒤 개선점을 말해 주는 것이 좋다.","value":"F"}]},
    {"id":7,"text":"식사나 운동 방법을 배울 때 나는","dimension":"SN","options":[{"label":"A","text":"실제 예시와 단계별 설명이 이해하기 쉽다.","value":"S"},{"label":"B","text":"전체 원리와 다양한 응용 방법이 이해하기 쉽다.","value":"N"}]},
    {"id":8,"text":"새로운 습관을 시작할 때 나는","dimension":"JP","options":[{"label":"A","text":"목표 기간과 완료 기준을 먼저 정한다.","value":"J"},{"label":"B","text":"일단 시작한 뒤 나에게 맞게 조정한다.","value":"P"}]},
    {"id":9,"text":"피드백 어조","dimension":"coaching","options":[{"label":"A","text":"핵심을 솔직하고 직접적으로 말해 주는 것이 좋다.","value":"direct"},{"label":"B","text":"부담되지 않도록 부드럽게 격려해 주는 것이 좋다.","value":"empathetic"}]},
    {"id":10,"text":"AI 코치와 대화할 때 나는","dimension":"EI","options":[{"label":"A","text":"질문과 응답이 활발하게 이어지는 것이 좋다.","value":"E"},{"label":"B","text":"필요한 조언만 받고 혼자 생각할 시간이 있는 것이 좋다.","value":"I"}]},
    {"id":11,"text":"건강 기록을 확인할 때 나는","dimension":"SN","options":[{"label":"A","text":"수면시간, 활동 횟수 등 실제 수치에 집중한다.","value":"S"},{"label":"B","text":"기록이 보여주는 생활 패턴과 변화 방향에 집중한다.","value":"N"}]},
    {"id":12,"text":"두 가지 건강관리 방법 중 하나를 선택한다면","dimension":"TF","options":[{"label":"A","text":"효과와 효율성을 비교해 선택한다.","value":"T"},{"label":"B","text":"부담 없이 지속할 수 있는지를 보고 선택한다.","value":"F"}]},
    {"id":13,"text":"설명 분량","dimension":"coaching","options":[{"label":"A","text":"바로 실천할 수 있도록 짧게 알려주는 것이 좋다.","value":"concise"},{"label":"B","text":"조언의 이유와 원리까지 자세히 설명해 주는 것이 좋다.","value":"detailed"}]},
    {"id":14,"text":"AI 코치가 활동 계획을 추천한다면","dimension":"JP","options":[{"label":"A","text":"시간과 순서가 정해진 계획 하나가 좋다.","value":"J"},{"label":"B","text":"여러 선택지 중 상황에 맞게 고르는 방식이 좋다.","value":"P"}]},
    {"id":15,"text":"계획 제공 방식","dimension":"coaching","options":[{"label":"A","text":"AI가 가장 적합한 계획 하나를 정해 주는 것이 좋다.","value":"single"},{"label":"B","text":"여러 가지 방법을 제시하고 내가 선택하는 것이 좋다.","value":"multiple"}]}
  ],
  "nicknames": {
    "ISTJ":"루틴 설계자","ISFJ":"다정한 꾸준러","INFJ":"의미 성장가","INTJ":"전략 최적화가",
    "ISTP":"실전 조정가","ISFP":"편안한 밸런서","INFP":"가치 회복가","INTP":"습관 실험가",
    "ESTP":"액션 스타터","ESFP":"즐거움 추진가","ENFP":"변화 탐험가","ENTP":"챌린지 발명가",
    "ESTJ":"목표 실행대장","ESFJ":"함께하는 응원가","ENFJ":"동기부여 리더","ENTJ":"성과 전략가"
  },
  "coachStyles": {
    "ISTJ":"체계적 루틴과 데이터 기반 피드백으로 꾸준히 관리해 드립니다.",
    "ISFJ":"따뜻한 격려와 실천 가능한 작은 목표로 함께 걸어갑니다.",
    "INFJ":"장기적 의미와 내면 동기를 연결해 깊은 변화를 이끌어 드립니다.",
    "INTJ":"최적의 전략을 설계하고 효율적으로 목표에 도달하도록 돕습니다.",
    "ISTP":"실전 중심의 간결한 피드백으로 유연하게 조정해 드립니다.",
    "ISFP":"부담 없는 속도로 자연스럽게 균형 잡힌 생활을 안내합니다.",
    "INFP":"개인 가치와 감정을 존중하며 회복과 성장을 지원합니다.",
    "INTP":"원리를 설명하고 다양한 실험을 통해 최적 습관을 찾아갑니다.",
    "ESTP":"빠른 액션과 즉각적 피드백으로 실행력을 높여 드립니다.",
    "ESFP":"재미있는 도전과 긍정 에너지로 건강습관을 놀이처럼 만듭니다.",
    "ENFP":"새로운 아이디어와 영감으로 변화의 즐거움을 함께합니다.",
    "ENTP":"창의적 챌린지와 논리적 분석으로 한계를 넓혀 드립니다.",
    "ESTJ":"명확한 목표와 실행 계획으로 확실한 성과를 만들어 드립니다.",
    "ESFJ":"함께하는 느낌과 진심 어린 응원으로 동기를 유지해 드립니다.",
    "ENFJ":"비전을 공유하고 열정적 동기부여로 최고의 나를 이끕니다.",
    "ENTJ":"성과 중심 전략과 도전적 목표로 빠른 성장을 설계합니다."
  },
  "coachingLabels": {
    "direct":"솔직하고 직접적인 피드백","empathetic":"부드럽고 격려하는 피드백",
    "concise":"핵심만 짧게 전달","detailed":"이유와 원리까지 자세히 설명",
    "single":"최적 계획 하나를 제공","multiple":"여러 선택지를 제시"
  }
};

const app = document.getElementById('app');
let answers = {};

function renderSurvey() {
  let html = `<h1>${surveyData.title}</h1>`;
  html += `<p class="description">${surveyData.description}</p>`;
  html += `<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>`;

  surveyData.questions.forEach((q, idx) => {
    html += `<div class="question-card" id="qcard-${q.id}">`;
    html += `<div class="question-number">Q${idx + 1}</div>`;
    html += `<div class="question-text">${q.text}</div>`;
    q.options.forEach(opt => {
      html += `<label class="option-label" id="opt-${q.id}-${opt.label}">`;
      html += `<input type="radio" name="q${q.id}" value="${opt.value}" onchange="selectAnswer(${q.id},'${opt.value}','${opt.label}')">`;
      html += `<span class="option-badge">${opt.label}</span>`;
      html += `<span class="option-text">${opt.text}</span>`;
      html += `</label>`;
    });
    html += `</div>`;
  });

  html += `<button class="submit-btn" id="submitBtn" onclick="submitSurvey()">결과 보기</button>`;
  html += `<div class="warning-msg" id="warningMsg">모든 문항에 답해 주세요.</div>`;
  app.innerHTML = html;
}

function selectAnswer(qId, value, label) {
  answers[qId] = value;
  const card = document.getElementById(`qcard-${qId}`);
  card.classList.add('answered');
  const q = surveyData.questions.find(q => q.id === qId);
  q.options.forEach(opt => {
    const el = document.getElementById(`opt-${qId}-${opt.label}`);
    el.classList.toggle('selected', opt.label === label);
  });
  updateProgress();
}

function updateProgress() {
  const total = surveyData.questions.length;
  const answered = Object.keys(answers).length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function submitSurvey() {
  if (Object.keys(answers).length < surveyData.questions.length) {
    document.getElementById('warningMsg').style.display = 'block';
    for (let q of surveyData.questions) {
      if (!answers[q.id]) {
        document.getElementById(`qcard-${q.id}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
        break;
      }
    }
    return;
  }
  calculateResult();
}

function calculateResult() {
  const dims = { EI: { E: 0, I: 0 }, SN: { S: 0, N: 0 }, TF: { T: 0, F: 0 }, JP: { J: 0, P: 0 } };
  const coaching = [];

  surveyData.questions.forEach(q => {
    const ans = answers[q.id];
    if (q.dimension === 'coaching') {
      coaching.push(ans);
    } else {
      dims[q.dimension][ans]++;
    }
  });

  const mbti =
    (dims.EI.E >= 2 ? 'E' : 'I') +
    (dims.SN.S >= 2 ? 'S' : 'N') +
    (dims.TF.T >= 2 ? 'T' : 'F') +
    (dims.JP.J >= 2 ? 'J' : 'P');

  const nickname = surveyData.nicknames[mbti];
  const coachStyle = surveyData.coachStyles[mbti];

  // Google Sheets로 결과 전송
  sendToGoogleSheets(mbti, nickname, coaching, dims);

  const prefLabel = (count) => {
    if (count === 3) return '강한 선호';
    if (count === 2) return '약한 선호';
    return '';
  };

  let html = `<div class="result-section">`;
  html += `<div class="result-type">${mbti}</div>`;
  html += `<div class="result-nickname">${nickname}</div>`;

  html += `<div class="dimension-scores">`;
  const dimInfo = [
    { key: 'EI', a: 'E', b: 'I', labelA: '외향(E)', labelB: '내향(I)' },
    { key: 'SN', a: 'S', b: 'N', labelA: '감각(S)', labelB: '직관(N)' },
    { key: 'TF', a: 'T', b: 'F', labelA: '사고(T)', labelB: '감정(F)' },
    { key: 'JP', a: 'J', b: 'P', labelA: '판단(J)', labelB: '인식(P)' }
  ];
  dimInfo.forEach(d => {
    const winner = dims[d.key][d.a] >= 2 ? d.a : d.b;
    const winnerCount = dims[d.key][winner];
    const winnerLabel = winner === d.a ? d.labelA : d.labelB;
    html += `<div class="dimension-card">`;
    html += `<div class="dimension-label">${d.labelA} vs ${d.labelB}</div>`;
    html += `<div class="dimension-value">${winner} ${dims[d.key][winner]}/3</div>`;
    html += `<div class="dimension-preference">${winnerLabel} · ${prefLabel(winnerCount)}</div>`;
    html += `</div>`;
  });
  html += `</div>`;

  html += `<div class="coaching-section">`;
  html += `<div class="coaching-title">나의 코칭 선호 스타일</div>`;
  coaching.forEach(c => {
    html += `<div class="coaching-item">${surveyData.coachingLabels[c]}</div>`;
  });
  html += `</div>`;

  html += `<div class="coach-style"><strong>맞춤 AI 코치 스타일</strong><br>${coachStyle}</div>`;

  html += `<button class="submit-btn" onclick="restart()">다시 검사하기</button>`;
  html += `</div>`;
  app.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// Google Sheets 전송 함수
// ============================================================
function sendToGoogleSheets(mbti, nickname, coaching, dims) {
  if (GOOGLE_SHEET_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
    console.log('[설문 결과] Google Sheets URL 미설정. 콘솔에만 기록합니다:', { mbti, nickname, coaching, dims, answers });
    return;
  }
  const payload = {
    timestamp: new Date().toISOString(),
    mbti: mbti,
    nickname: nickname,
    coaching: coaching,
    scores: {
      E: dims.EI.E, I: dims.EI.I,
      S: dims.SN.S, N: dims.SN.N,
      T: dims.TF.T, F: dims.TF.F,
      J: dims.JP.J, P: dims.JP.P
    },
    answers: answers
  };
  fetch(GOOGLE_SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(err => console.warn('시트 전송 실패:', err));
}

function restart() {
  answers = {};
  renderSurvey();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderSurvey();
</script>
</body>
</html>
